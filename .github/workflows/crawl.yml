name: Cao ma giam gia Shopee

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Cai dat Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cai dat thu vien
        run: npm install

      - name: Chay crawler
        run: node crawler.js

      - name: Commit va push ket qua
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add voucher-data.json
          git diff --staged --quiet || git commit -m "Tu dong cap nhat ma giam gia"
          git push